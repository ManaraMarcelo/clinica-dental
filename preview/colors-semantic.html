<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--bg-card);font-family:var(--font-body)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;width:128px}
  .chip{height:64px;border-radius:var(--radius-md)}
  .lbl{font-size:11px;color:var(--ink-400);font-family:var(--font-mono)}
  .name{font-size:13px;color:var(--ink-900);font-weight:600}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1A1A1F"></div><div class="name">ink-900 headings</div><div class="lbl">#1A1A1F</div></div>
  <div class="sw"><div class="chip" style="background:#5C5C66"></div><div class="name">ink-500 body</div><div class="lbl">#5C5C66</div></div>
  <div class="sw"><div class="chip" style="background:#9A9AA3"></div><div class="name">ink-300 meta</div><div class="lbl">#9A9AA3</div></div>
  <div class="sw"><div class="chip" style="background:#1F8A5B"></div><div class="name">success</div><div class="lbl">#1F8A5B</div></div>
  <div class="sw"><div class="chip" style="background:#D97757"></div><div class="name">warning</div><div class="lbl">#D97757</div></div>
  <div class="sw"><div class="chip" style="background:#D14B4B"></div><div class="name">danger</div><div class="lbl">#D14B4B</div></div>
</div>
</body></html>
