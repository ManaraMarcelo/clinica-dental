<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--bg-card)}
  h4{font-family:var(--font-display);margin:0 0 6px;font-size:16px;color:var(--ink-900);font-weight:600}
  p{font-size:13.5px;color:var(--ink-500);line-height:1.5;margin:0 0 14px}
  .demo{height:100px;border-radius:12px;background:linear-gradient(135deg,#F5F4F2,#E9E8E6);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .badge{background:var(--primary-500);color:#fff;border-radius:999px;padding:8px 14px 8px 12px;font-size:12px;font-weight:600;box-shadow:var(--shadow-pop);display:inline-flex;align-items:center;gap:8px}
  .badge svg{width:14px;height:14px}
  .ring{position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(110,91,255,.18),transparent 60%)}
</style></head><body>
<div class="card">
  <h4>Whitening on Steroids</h4>
  <p>In-chair sessions that lift years of stain in 45 minutes.</p>
  <div class="demo">
    <div class="ring"></div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3 L18 3 L22 9 L12 22 L2 9 Z"/><path d="M9 9 L12 22 L15 9 Z" fill="rgba(255,255,255,.22)"/><path d="M6 3 L9 9 L2 9 Z" fill="rgba(255,255,255,.12)"/></svg>
      Premium Whitening
    </div>
  </div>
</div>
</body></html>
