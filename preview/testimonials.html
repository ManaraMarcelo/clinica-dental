<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:28px;background:var(--bg-card)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .testimonial{background:#fff;border-radius:999px;padding:12px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);max-width:340px}
  .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8A6BFF,#FF6EC4);flex-shrink:0}
  .quote{font-size:13.5px;color:var(--ink-700);line-height:1.4}
  .handle{font-size:12px;color:var(--ink-400);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="testimonial">
    <div class="avatar"></div>
    <div><div class="quote">"0 anxiety, 10/10 smile."</div><div class="handle">@miladentin</div></div>
  </div>
  <div class="testimonial">
    <div class="avatar" style="background:linear-gradient(135deg,#6EDBE0,#8A6BFF)"></div>
    <div><div class="quote">"Whitening that actually slaps."</div><div class="handle">@kevhasteeth</div></div>
  </div>
</div>
</body></html>
