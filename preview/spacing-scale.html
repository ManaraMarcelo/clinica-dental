<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:28px;background:var(--bg-card)}
  .row{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:var(--primary-200);border-radius:8px}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--ink-400)}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--ink-700)}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="name">space-1</div><div class="v">4</div></div>
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="name">space-2</div><div class="v">8</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="name">space-3</div><div class="v">12</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="name">space-4</div><div class="v">16</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="name">space-6</div><div class="v">24</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="name">space-8</div><div class="v">32</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="name">space-12</div><div class="v">48</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="name">space-16</div><div class="v">64</div></div>
  <div class="item"><div class="box" style="width:96px;height:96px"></div><div class="name">space-24</div><div class="v">96</div></div>
</div>
</body></html>
