<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--bg-card);font-family:var(--font-body)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;width:108px}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:var(--shadow-card)}
  .lbl{font-size:11px;color:var(--ink-400);font-family:var(--font-mono)}
  .name{font-size:13px;color:var(--ink-900);font-weight:600}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#F1EEFF"></div><div class="name">primary-50</div><div class="lbl">#F1EEFF</div></div>
  <div class="sw"><div class="chip" style="background:#C6BCFF"></div><div class="name">primary-200</div><div class="lbl">#C6BCFF</div></div>
  <div class="sw"><div class="chip" style="background:#8775FF"></div><div class="name">primary-400</div><div class="lbl">#8775FF</div></div>
  <div class="sw"><div class="chip" style="background:#6E5BFF;outline:2px solid #6E5BFF;outline-offset:-2px"></div><div class="name">primary-500 ★</div><div class="lbl">#6E5BFF</div></div>
  <div class="sw"><div class="chip" style="background:#5A48E8"></div><div class="name">primary-600</div><div class="lbl">#5A48E8</div></div>
  <div class="sw"><div class="chip" style="background:#342896"></div><div class="name">primary-800</div><div class="lbl">#342896</div></div>
</div>
</body></html>
