<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--bg-page);font-family:var(--font-body)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;width:112px}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:var(--shadow-card);border:1px solid var(--border)}
  .lbl{font-size:11px;color:var(--ink-400);font-family:var(--font-mono)}
  .name{font-size:13px;color:var(--ink-900);font-weight:600}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#E9E8E6"></div><div class="name">bg-page</div><div class="lbl">#E9E8E6</div></div>
  <div class="sw"><div class="chip" style="background:#F5F4F2"></div><div class="name">bg-card</div><div class="lbl">#F5F4F2</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">bg-card-hi</div><div class="lbl">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#ECEAE5"></div><div class="name">bg-inset</div><div class="lbl">#ECEAE5</div></div>
  <div class="sw"><div class="chip" style="background:#E2E0DB"></div><div class="name">border</div><div class="lbl">#E2E0DB</div></div>
  <div class="sw"><div class="chip" style="background:#D4D2CC"></div><div class="name">border-strong</div><div class="lbl">#D4D2CC</div></div>
</div>
</body></html>
