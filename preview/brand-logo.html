<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

  .marks{display:flex;align-items:center;gap:18px}
  .plate{width:84px;height:84px;border-radius:24px;background:var(--bg-card);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-card)}

  .plate--dark{background:var(--ink-900)}
  .lockup{display:flex;flex-direction:column;gap:6px}
  .wordmark{font-family:var(--font-display);font-weight:700;font-size:34px;color:var(--ink-900);letter-spacing:-.03em;line-height:1;display:flex;align-items:center;gap:10px}
  .dot{color:var(--primary-500)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-400);margin-top:4px}
  .tooth{width:44px;height:44px}
</style></head><body>
