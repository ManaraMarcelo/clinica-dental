<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:32px;background:var(--bg-page);display:flex;justify-content:center;align-items:center;min-height:240px}
  nav{display:flex;align-items:center;gap:6px;background:rgba(245,244,242,.85);backdrop-filter:blur(16px);padding:8px 8px 8px 18px;border-radius:999px;box-shadow:var(--shadow-card)}
  nav a{font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--ink-700);padding:8px 14px;border-radius:999px;text-decoration:none}
  nav a:hover{background:rgba(20,20,30,.05);color:var(--ink-900)}
  .brand{display:flex;align-items:center;gap:8px;padding-right:14px;margin-right:6px;border-right:1px solid var(--border)}
  .brand-name{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-900);letter-spacing:-.01em}
</style></head><body>
<nav>
  <div class="brand">
    <img src="../assets/logo-mark.svg" width="22" height="22" alt="">
    <span class="brand-name">Dental Clinic</span>
  </div>
  <a href="#">Services</a><a href="#">Pricing</a><a href="#">Team</a><a href="#">Stories</a>
  <button class="btn btn--primary" style="padding:8px 16px;font-size:14px;margin-left:6px">Book Now</button>
</nav>
</body></html>
