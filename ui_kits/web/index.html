<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dental Clinic — Smiles That Slap</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  /* Local animation helpers */
  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  @keyframes pulse {
    0%   { transform: scale(.6); opacity: .9; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  @keyframes dotPop {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.18); }
  }
  @keyframes marqueeL {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @keyframes marqueeR {
    from { transform: translateX(-50%); }
    to   { transform: translateX(0); }
  }
  .float-y { animation: floatY 5s ease-in-out infinite; }

  .marquee     { animation: marqueeL 60s linear infinite; }
  .marquee--rev { animation: marqueeR 70s linear infinite; }
  .marquee:hover, .marquee--rev:hover { animation-play-state: paused; }

  /* scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 600ms var(--ease-soft), transform 600ms var(--ease-soft);
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }
  /* slight stagger when several .reveal share a parent */
  .reveal.in:nth-child(2) { transition-delay: 80ms; }
  .reveal.in:nth-child(3) { transition-delay: 160ms; }

  body { overflow-x: hidden; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Manifesto.jsx"></script>
  <script type="text/babel" src="Features.jsx"></script>
  <script type="text/babel" src="Testimonials.jsx"></script>
  <script type="text/babel" src="Platforms.jsx"></script>
  <script type="text/babel" src="FinalCTA.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const { Nav, Hero, Manifesto, Features, Testimonials, Platforms, FinalCTA, Footer } = window;
      // scroll reveal
      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);

      return (
        <>
          <Nav />
          <Hero />
          <Manifesto />
          <Features />
          <Testimonials />
          <Platforms />
          <FinalCTA />
          <Footer />
        </>
      );
    };

    // Poll until every external babel script has registered its component on window.
    const NEEDED = ['Nav', 'Hero', 'Manifesto', 'Features', 'Testimonials', 'Platforms', 'FinalCTA', 'Footer'];
    const tryRender = () => {
      if (!NEEDED.every(n => typeof window[n] === 'function')) {
        return setTimeout(tryRender, 50);
      }
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    };
    tryRender();
  </script>
</body>
</html>
